# fly.toml app configuration file generated for stories-go on 2026-04-03T21:27:35-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stories-go'
primary_region = 'gru'

[build]

[env]
  DATA_DIR = '/data'
  PORT = '8080'

[[mounts]]
  source = 'stories_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
